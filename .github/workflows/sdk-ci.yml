name: SDK CI

on:
  pull_request:
    paths:
      - "**"
      - ".github/workflows/sdk-ci.yml"
  push:
    paths:
      - "**"
      - ".github/workflows/sdk-ci.yml"
  workflow_dispatch:

jobs:
  sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Packaging Check (publint)
        run: pnpm check:publint

      - name: Packaging Check (ATTW)
        run: pnpm check:attw

      - name: Lint (read-only)
        run: pnpm lint

      - name: Test
        run: pnpm test
